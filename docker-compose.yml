services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hashtag_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hashtag_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      STAGE: local
      PORT: 3000
      # container-internal host is `db`, not localhost
      DATABASE_URL: postgres://postgres:postgres@db:5432/hashtag_tracker
      # supplied from the project-root .env (compose interpolates it); empty -> syncs skip
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_USER_ID: ${META_USER_ID:-}
      SYNC_CRON: ${SYNC_CRON:-0 */3 * * *}
      MEDIA_DIR: /app/media
      PUBLIC_BASE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - media:/app/media

volumes:
  pgdata:
  media:
